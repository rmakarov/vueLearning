name: CI — Lint & Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Отменяем старые запуски, если пришёл новый коммит
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 🔹 Проверка бэкенда
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (если есть eslint)
        run: npm run lint --if-present

      - name: Test (если есть тесты)
        run: npm test --if-present

      - name: Build check (проверка, что сервер стартует)
        run: node -c server.cjs

  # 🔹 Проверка фронтенда
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (Vue + TypeScript)
        run: npm run type-check --if-present

      - name: Build frontend
        run: npm run build