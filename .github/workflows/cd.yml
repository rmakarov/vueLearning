name: CD — Build & Push Docker Images

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]  # запуск при создании тега вроде v1.0.0
  workflow_dispatch:  # ручной запуск из UI GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # нужно для пуша в GHCR
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🔹 Сборка и пуш образа бэкенда
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/kafka-vue-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/kafka-vue-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🔹 Сборка и пуш образа фронтенда
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/kafka-vue-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/kafka-vue-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max